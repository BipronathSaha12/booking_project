<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Ticket</title>
<style>
  body{font-family:Arial;text-align:center;padding:50px;}
  h1{color:#333;}
  p{font-size:18px;}
  .ticket{border:2px dashed #333;padding:20px;margin-top:20px;}
  .qr{margin-top:20px;}
</style>
</head>
<body>
<h1>Booking Ticket</h1>
<div class="ticket">
  <p><strong>Name:</strong> {{ booking.user.get_full_name|default:booking.user.username }}</p>
  <p><strong>Service:</strong> {{ booking.service.name }}</p>
  <p><strong>Date:</strong> {{ booking.date }}</p>
  <p><strong>Booking ID:</strong> {{ booking.id }}</p>
  {% if booking.qr_code %}
  <div class="qr">
    <p><strong>Your QR Code</strong></p>
    <img src="{{ booking.qr_code.url }}" alt="QR Code" width="200" />
  </div>
  {% endif %}
</div>
</body>
</html>
