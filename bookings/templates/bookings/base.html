{% load static %}
<!DOCTYPE html>
<html>

<head>

<title>Booking Platform</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link rel="stylesheet" href="{% static 'bookings/style.css' %}">

</head>

<body>

<nav class="navbar navbar-dark navbar-custom">

<div class="container">

<a class="navbar-brand" href="/">BookEasy</a>

<a href="/dashboard" class="btn btn-light">My Bookings</a>

{% if user.is_authenticated %}
    <span class="btn btn-light disabled">Logged in</span>
{% else %}
    <a href="{% url 'login' %}" class="btn btn-light">Login</a>
{% endif %}

</div>

</nav>

<div class="container mt-5">

{% if messages %}
  {% for message in messages %}
    <div class="alert alert-{{ message.tags }}" role="alert">
      {{ message }}
    </div>
  {% endfor %}
{% endif %}

{% block content %}

{% endblock %}

</div>
<script src="{% static 'bookings/script.js' %}"></script>
</body>
</html>
